<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1" />
		<title>Tutorials — ScriptLabs</title>
		<meta
			name="description"
			content="Tutoriales y guías para crear Add-ons de Minecraft Bedrock." />
		<link
			rel="icon"
			href="/assets/img/logo.png"
			type="image/svg+xml" />
		<link
			rel="stylesheet"
			href="/assets/css/styles.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
			rel="stylesheet" />
		<!-- Preload componentes -->
		<link
			rel="preload"
			href="/components/nav.html"
			as="fetch"
			crossorigin="anonymous" />
		<link
			rel="preload"
			href="/components/footer.html"
			as="fetch"
			crossorigin="anonymous" />
		<link
			rel="preload"
			href="/components/loader.html"
			as="fetch"
			crossorigin="anonymous" />

		<!-- Cargar loader primero -->
		<script
			src="/components/loader.js"
			defer></script>
		<!-- Scripts generales -->
		<script
			src="/assets/js/scripts.js"
			defer></script>
	</head>
	<body>
		<div class="bg-hero"></div>
		<header class="site-header"></header>

		<main class="section">
			<h1 class="gradient-text">Tutoriales</h1>
			<div class="filters btn-ghost">
				<button
					class="chip btn-ghost"
					data-filter="all">
					Todos
				</button>
				<button
					class="chip btn-ghost"
					data-filter="beginner">
					Principiante
				</button>
				<button
					class="chip btn-ghost"
					data-filter="intermediate">
					Intermedio
				</button>
				<button
					class="chip btn-ghost"
					data-filter="advanced">
					Avanzado
				</button>
				<button
					class="chip btn-ghost"
					data-filter="no-category">
					Sin categoría
				</button>
			</div>

			<div
				id="loading"
				class="loading">
				<h2>Cargando Videos</h2>
				<div class="loader"></div>
			</div>

			<div
				class="grid-3 tutorials"
				id="tutorialList"></div>

			<div
				class="not-found"
				id="not-found"
				style="display: none">
				<h2>
					Contenido no encontrado
				</h2>
					<img
						src="/assets/img/404.png"
						alt="imagen 404"
						height="200"
						/>
			</div>
		</main>

		<footer class="site-footer"></footer>
		<script src="/assets/js/utils/svg-finder.js"></script>

		<script src="/assets/js/utils/getVids.js"></script>
	</body>
</html>
