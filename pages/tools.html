<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1" />
		<title>Tools — ScriptLabs</title>
		<meta
			name="description"
			content="Herramientas y librerías de ScriptLabs para crear Add-ons." />
		<link
			rel="icon"
			href="/assets/img/logo.png"
			type="image/svg+xml" />
		<link
			rel="stylesheet"
			href="/assets/css/styles.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
			rel="stylesheet" />
		<!-- Preload componentes -->
		<link
			rel="preload"
			href="/components/nav.html"
			as="fetch"
			crossorigin="anonymous" />
		<link
			rel="preload"
			href="/components/footer.html"
			as="fetch"
			crossorigin="anonymous" />

		<!-- Cargar loader primero -->
		<script
			src="/components/loader.js"
			defer></script>
		<!-- Scripts generales -->
		<script
			src="/assets/js/scripts.js"
			defer></script>
	</head>
	<body>
		<div class="bg-hero"></div>
		<header class="site-header"></header>

		<main class="section">
			<h1 class="gradient-text">Herramientas</h1>
			<p class="lead">Todo lo que necesitas para empezar a construir.</p>

			<div class="grid-3 tools">
				<article
					id="editor"
					class="card glass">
					<h3>MCBE Script Editor</h3>
					<p>Monaco Editor con tipos dinámicos, PWA y offline.</p>
					<div class="actions">
						<a
							class="btn btn-primary"
							href="https://mcbeditor.vercel.app/"
							>Abrir</a
						>
						<a
							class="btn btn-ghost"
							href="#"
							>Docs</a
						>
					</div>
				</article>
			</div>
		</main>

		<footer class="site-footer"></footer>
		<script src="/assets/js/utils/svg-finder.js"></script>
	</body>
</html>
