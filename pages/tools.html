<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tools — ScriptLabs</title>
    <meta
      name="description"
      content="Herramientas y librerías de ScriptLabs para crear Add-ons."
    />
    <link rel="icon" href="/assets/img/logo.png" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" media="all" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
      media="all"
    />
    <!-- Preload componentes -->
    <link
      rel="preload"
      href="/components/nav.html"
      as="fetch"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/components/footer.html"
      as="fetch"
      crossorigin="anonymous"
    />

    <!-- Preload hero image for faster LCP -->
    <link
      rel="preload"
      as="image"
      href="/assets/img/logo.png"
      imagesrcset="/assets/img/logo.png 1x"
    />

    <!-- Cargar loader primero -->
    <script src="/components/loader.js" defer></script>
    <!-- Scripts generales -->
    <script src="/assets/js/scripts.js" defer></script>
  </head>
  <body>
    <div class="bg-hero"></div>
    <header class="site-header"></header>

    <main class="section">
      <h1 class="gradient-text">Herramientas</h1>
      <p class="lead">Todo lo que necesitas para empezar a construir.</p>

      <div class="grid-3 tools">
        <article id="editor" class="card glass">
          <h3>MCBE Script Editor</h3>
          <p>Monaco Editor con tipos dinámicos, PWA y offline.</p>
          <div class="actions">
            <a class="btn btn-primary" href="https://mcbeditor.vercel.app/"
              >Abrir</a
            >
            <a class="btn btn-ghost" href="#">Docs</a>
          </div>
        </article>
      </div>
    </main>

    <footer class="site-footer"></footer>
    <script type="module" src="/assets/js/utils/svg-bootstrap.js"></script>

    <!-- Optimize images for lazy loading -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        [...document.querySelectorAll("img")].forEach((img) => {
          if (!img.hasAttribute("loading")) img.setAttribute("loading", "lazy");
        });
      });
    </script>
  </body>
</html>
