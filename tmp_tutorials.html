<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tutorials — ScriptLabs</title>
    <meta
      name="description"
      content="Tutoriales y guías para crear Add-ons de Minecraft Bedrock."
    />
    <link rel="icon" href="/assets/img/logo.png" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- Preload componentes -->
    <link
      rel="preload"
      href="/components/nav.html"
      as="fetch"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/components/footer.html"
      as="fetch"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/components/loader.html"
      as="fetch"
      crossorigin="anonymous"
    />

    <!-- Cargar loader primero -->
    <script src="/components/loader.js" defer></script>
    <!-- Scripts generales -->
    <script src="/assets/js/scripts.js" defer></script>
  </head>
  <body>
    <div class="bg-hero"></div>
    <header class="site-header"></header>

    <main class="section">
      <h1 class="gradient-text">Tutoriales</h1>
      <div class="filters btn-ghost">
        <button class="chip btn-ghost" data-filter="all">Todos</button>
        <button class="chip btn-ghost" data-filter="beginner">
          Principiante
        </button>
        <button class="chip btn-ghost" data-filter="intermediate">
          Intermedio
        </button>
        <button class="chip btn-ghost" data-filter="advanced">Avanzado</button>
        <button class="chip btn-ghost" data-filter="no-category">
          Sin categoría
        </button>
      </div>

      <div id="loading" class="loading">
        <h2>Cargando Videos</h2>
        <div class="loader"></div>
      </div>

      <div class="grid-3 tutorials" id="tutorialList"></div>

      <div class="not-found" id="not-found" style="display: none">
        <h2>Contenido no encontrado</h2>
        <img src="/assets/img/404.png" alt="imagen 404" height="200" />
      </div>
    </main>

    <footer class="site-footer"></footer>
    <script type="module" src="/assets/js/utils/svg-bootstrap.js"></script>

    <script src="/assets/js/utils/getVids.js"></script>
    <!-- Code injected by live-server -->
    <script>
      // <![CDATA[  <-- For SVG support
      if ("WebSocket" in window) {
        (function () {
          function refreshCSS() {
            var sheets = [].slice.call(document.getElementsByTagName("link"));
            var head = document.getElementsByTagName("head")[0];
            for (var i = 0; i < sheets.length; ++i) {
              var elem = sheets[i];
              var parent = elem.parentElement || head;
              parent.removeChild(elem);
              var rel = elem.rel;
              if (
                (elem.href && typeof rel != "string") ||
                rel.length == 0 ||
                rel.toLowerCase() == "stylesheet"
              ) {
                var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, "");
                elem.href =
                  url +
                  (url.indexOf("?") >= 0 ? "&" : "?") +
                  "_cacheOverride=" +
                  new Date().valueOf();
              }
              parent.appendChild(elem);
            }
          }
          var protocol =
            window.location.protocol === "http:" ? "ws://" : "wss://";
          var address =
            protocol + window.location.host + window.location.pathname + "/ws";
          var socket = new WebSocket(address);
          socket.onmessage = function (msg) {
            if (msg.data == "reload") window.location.reload();
            else if (msg.data == "refreshcss") refreshCSS();
          };
          if (
            sessionStorage &&
            !sessionStorage.getItem("IsThisFirstTime_Log_From_LiveServer")
          ) {
            console.log("Live reload enabled.");
            sessionStorage.setItem("IsThisFirstTime_Log_From_LiveServer", true);
          }
        })();
      } else {
        console.error(
          "Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.",
        );
      }
      // ]]>
    </script>
  </body>
</html>
